<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✝️</text></svg>">
  <title>Jornada da Redenção</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen min-h-dvh">

<div class="w-full max-w-xl p-3 sm:p-4" id="root">

  <!-- LOGIN -->
  <div id="login" class="text-center space-y-4">
    <div class="mb-6">
      <div class="login-icon">✝️</div>
      <h1 class="text-2xl sm:text-3xl font-bold text-blue-400 mt-2">Jornada da Redenção</h1>
      <p class="text-slate-400 text-sm mt-1">Quiz bíblico interativo</p>
    </div>
    <input id="nome" placeholder="Digite seu nome"
      class="input" autocomplete="off" autocorrect="off" spellcheck="false">
    <button onclick="start()" class="btnPrimario">
      Começar Jornada
    </button>
    <button onclick="verRankingGlobal()" class="btn" style="background:#475569">
      🏆 Ver Ranking Global
    </button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden"></div>

  <!-- FINAL -->
  <div id="final" class="hidden text-center space-y-4 p-4">
    <div style="font-size:3rem">🎉</div>
    <h2 class="text-2xl font-bold text-blue-400">Parabéns!</h2>
    <p id="resultado" class="text-lg font-semibold text-yellow-400"></p>
    <div id="ranking-position" class="text-sm text-slate-400"></div>
    <button onclick="verRankingGlobal()" class="btnPrimario">🏆 Ver Ranking Global</button>
    <button onclick="location.reload()" class="btn mt-2" style="background:#475569">🔄 Jogar Novamente</button>
  </div>

  <!-- RANKING -->
  <div id="ranking" class="hidden text-center space-y-3 p-2">
    <h2 class="text-xl font-bold">🏆 Ranking Global</h2>
    <div id="ranking-loading" class="hidden text-slate-400 py-4">
      <div class="loading"></div>
      <p class="mt-2">Carregando ranking...</p>
    </div>
    <ul id="listaRanking" class="space-y-2 text-left"></ul>
    <button onclick="voltarLogin()" class="btnPrimario mt-2">
      🔄 Voltar ao início
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
